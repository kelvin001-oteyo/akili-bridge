<!DOCTYPE html>
<html>
    <head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .email-container {
      max-width: 600px;
      margin: 20px auto;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
    }

    h2 {
      color: #0066cc;
      margin-bottom: 15px;
    }

    p {
      line-height: 1.6;
      margin: 10px 0;
    }

    .button {
      display: inline-block;
      background-color: #ff6600;
      color: #fff !important;
      padding: 10px 20px;
      margin-top: 20px;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
  </style>
</head>

  <body style="font-family: Arial, sans-serif; color:#333;">
    <h2 style="color:#0066cc;">Akili Bridge Application Received</h2>
    <p>Dear {{ full_name }},</p>
    <p>Thank you for applying to <strong>Akili Bridge</strong>. Your application has been received and is now under review.</p>
    <p>We’ll notify you once a decision has been made.</p>
    <p style="margin-top:20px;">Best regards,<br>Akili Bridge Team</p>
  </body>
</html>
